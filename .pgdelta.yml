version: 1

main:
  url: postgres://localhost:5432/maindb
  access: readonly

branch_db:
  url: postgres://postgres:pgdelta@localhost:5433/branchdb
  access: readwrite

branching:
  schema_from: git-parent
  auto_create: true
  auto_cleanup: true
  auto_merge: true

snapshots:
  default_row_limit: 10000
  chunk_size: 10000
  parallel_tables: 3
  resume_on_interrupt: true
  tables:
    users:
      query: "SELECT * FROM users"
      limit: 5000
    orders:
      query: "SELECT * FROM orders"
      limit: 5000
    products:
      query: "SELECT * FROM products"
      limit: 5000
  exclude:
    - audit_logs
    - sessions
    - password_reset_tokens

pii:
  auto_detect: true
  masks: {}

ai:
  enabled: true
  provider: anthropic
  api_key: ${ANTHROPIC_API_KEY}
  features:
    extraction_suggestions: true
    migration_risk: true
    conflict_resolution: true
    pii_detection: true

git:
  hooks: true
  status_line: true

telemetry:
  enabled: true
  anonymous: true
