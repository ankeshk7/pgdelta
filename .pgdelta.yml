ai:
    api_key: ${ANTHROPIC_API_KEY}
    enabled: true
    features:
        conflict_resolution: true
        extraction_suggestions: true
        migration_risk: true
        pii_detection: true
    provider: anthropic
branch_db:
    access: readwrite
    url: postgres://postgres:pgdelta@localhost:5433/branchdb
branching:
    auto_cleanup: true
    auto_create: true
    auto_merge: true
    schema_from: git-parent
git:
    hooks: true
    status_line: true
main:
    access: readonly
    url: postgres://localhost:5432/maindb
pii:
    auto_detect: true
    masks: {}
snapshots:
    chunk_size: 10000
    default_row_limit: 5000
    exclude: []
    parallel_tables: 3
    resume_on_interrupt: true
    tables:
        orders:
            limit: 0
            query: SELECT id, user_id, amount, status, created_at FROM orders WHERE created_at >= NOW() - INTERVAL '30 days' LIMIT 10000
        products:
            limit: 0
            query: SELECT id, name, price, stock, created_at FROM products LIMIT 5000
        users:
            limit: 0
            query: SELECT id, email, name, plan, created_at, status FROM users WHERE status = 'active' LIMIT 5000
telemetry:
    anonymous: true
    enabled: true
version: 1
