ai:
    api_key: ${ANTHROPIC_API_KEY}
    enabled: true
    features:
        conflict_resolution: true
        extraction_suggestions: true
        migration_risk: true
        pii_detection: true
    provider: anthropic
branch_db:
    access: readwrite
    url: postgres://postgres:pgdelta@localhost:5433/branchdb
branching:
    auto_cleanup: true
    auto_create: true
    auto_merge: true
    schema_from: git-parent
git:
    hooks: true
    status_line: true
main:
    access: readonly
    url: postgres://localhost:5432/maindb
pii:
    auto_detect: true
    masks: {}
# Auto-generated by pgdelta configure
# Edit queries per table, or run 'pgdelta configure' to regenerate
# Add a single table: pgdelta configure --table=<name>
snapshots:
    chunk_size: 10000
    default_row_limit: 5000
    exclude: []
    parallel_tables: 3
    resume_on_interrupt: true
    tables:
        orders:
            query: SELECT * FROM orders WHERE created_at >= NOW() - INTERVAL '30 days' LIMIT 10000
        products:
            query: SELECT * FROM products
        users:
            query: SELECT * FROM users WHERE created_at >= NOW() - INTERVAL '30 days' LIMIT 5000
telemetry:
    anonymous: true
    enabled: true
version: 1
